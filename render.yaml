# Render Blueprint — deploy LeetCode Tracker to Render
#
# Usage:
#   1. Push this repo to GitHub/GitLab
#   2. In Render dashboard → New → Blueprint → pick this repo
#   3. Render will detect render.yaml and create the service for you
#   4. Set the following env vars in the Render dashboard:
#        - JWT_SECRET_KEY (REQUIRED — generate with `openssl rand -hex 32`)
#        - DATABASE_URL  (REQUIRED — your Neon/Supabase/Postgres connection string)
#
# Note: Persistent disks are not available on Render free tier.
# This config uses an external PostgreSQL database (e.g. Neon) instead of SQLite.

services:
  - type: web
    name: leetcode-tracker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false  # set this in the Render dashboard — your Postgres connection string (REQUIRED)
      - key: JWT_SECRET_KEY
        sync: false  # set this in the Render dashboard (REQUIRED)
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "lax"
      - key: MAX_CSV_SIZE_BYTES
        value: "5242880"
      - key: NODE_ENV
        value: production
